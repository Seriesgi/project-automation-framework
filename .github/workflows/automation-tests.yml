name: Automation Tests

on:
  workflow_dispatch:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run API tests
        env:
          DUMMY_API_APP_ID: ${{ secrets.DUMMY_API_APP_ID }}
        run: ./gradlew apiTest

      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-cucumber-report
          path: |
            build/reports/cucumber/api
            build/test-results/apiTest

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run Web tests
        run: ./gradlew webTest -Dheadless=true

      - name: Upload Web reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-cucumber-report
          path: |
            build/reports/cucumber/web
            build/test-results/webTest
